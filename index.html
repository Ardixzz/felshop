<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ardixzz Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-slate-100">

<nav class="bg-white shadow p-4">
<h1 class="text-xl font-bold">Ardixzz Store</h1>
</nav>

<main class="max-w-6xl mx-auto p-6">

<div id="product-grid" class="grid md:grid-cols-3 gap-6"></div>

</main>

<script>

/* ======================
   DUMMY PRODUCT DATA
====================== */

const products = [
{
    name: "Minecraft Server Basic",
    description: "Server demo dummy",
    price: 15000,
    image: "https://via.placeholder.com/300"
},
{
    name: "Minecraft Server Pro",
    description: "Server demo dummy",
    price: 30000,
    image: "https://via.placeholder.com/300"
}
];

/* ======================
   RENDER PRODUCT
====================== */

function renderProducts() {
    const grid = document.getElementById("product-grid");

    grid.innerHTML = products.map(p => `
        <div class="bg-white rounded-xl shadow p-4 flex flex-col">

            <img src="${p.image}"
            class="h-40 w-full object-cover rounded-lg mb-3">

            <h3 class="font-bold">${p.name}</h3>

            <p class="text-gray-500 text-sm mb-2">
                ${p.description}
            </p>

            <div class="text-green-600 font-bold text-lg mb-3">
                Rp ${p.price.toLocaleString("id-ID")}
            </div>

            <button onclick="pay('${p.price}')"
            class="bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">

            <i class="fas fa-credit-card mr-2"></i>
            Bayar

            </button>

        </div>
    `).join("");
}

/* ======================
   PAYMENT REDIRECT
====================== */

function pay(amount){
    const slug = "shop-ardii-web-id";

    const orderId = "INV" + Date.now();

    const url =
    `https://app.pakasir.com/pay/${slug}/${amount}?order_id=${orderId}`;

    window.open(url,"_blank");
}

window.onload = renderProducts;

</script>

</body>
</html>
